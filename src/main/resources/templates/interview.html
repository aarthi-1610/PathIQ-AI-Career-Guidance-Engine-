<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Interview Generator</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>

body{
background:
linear-gradient(
135deg,
#0f172a,
#1e293b,
#312e81
);

min-height:100vh;
color:white;
}

.glass{

background:rgba(255,255,255,0.1);

backdrop-filter:blur(12px);

border-radius:20px;

padding:30px;
}

.result{

margin-top:20px;

background:#111827;

padding:20px;

border-radius:15px;

display:none;
}

.loader{

display:none;

text-align:center;

margin-top:20px;
}

</style>

</head>

<body>

<div class="container py-5">

<h1 class="text-center mb-4">
🎯 AI Interview Generator
</h1>

<div class="glass">

<div class="mb-3">

<label>Job Role</label>

<input
type="text"
id="role"
class="form-control"
placeholder="Java Developer">

</div>

<button
onclick="generateQuestions()"
class="btn btn-success">

Generate Questions

</button>

<div
id="loader"
class="loader">

<div class="spinner-border">
</div>

<p>
Generating Questions...
</p>

</div>

<div
id="result"
class="result">

</div>

</div>

</div>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>

async function generateQuestions(){

    let role =
    document.getElementById("role").value;

    if(role.trim()===""){

        alert("Enter role");
        return;
    }

    document.getElementById("loader")
    .style.display="block";

    try{

        let response =
        await fetch(
        "/api/interview/questions",
        {

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                technology: role,
                level: "Beginner"
            })

        });

        let data =
        await response.json();

        console.log(data);

        document.getElementById("loader")
        .style.display="none";

        document.getElementById("result")
        .style.display="block";

        document.getElementById("result")
        .innerHTML = marked.parse(data.answer);

    }
    catch(error){

        document.getElementById("loader")
        .style.display="none";

        alert("Error");

        console.log(error);
    }

}

</script>

</body>

</html>
