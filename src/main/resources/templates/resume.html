<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Resume Analyzer</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>

body{
background:
linear-gradient(
135deg,
#0f172a,
#1e293b,
#312e81
);

min-height:100vh;
color:white;
}

.glass{

background:rgba(255,255,255,0.1);

backdrop-filter:blur(12px);

border-radius:20px;

padding:30px;
}

textarea{

background:#111827 !important;

color:white !important;

border:none !important;
}

.result{

margin-top:20px;

background:#111827;

padding:25px;

border-radius:15px;

display:none;

line-height:1.8;

overflow:auto;
}

.result h1,
.result h2,
.result h3,
.result h4{

color:#60a5fa;
margin-top:20px;
}

.result ul{

padding-left:20px;
}
.loader{

display:none;

text-align:center;

margin-top:20px;
}

</style>

</head>

<body>

<div class="container py-5">

<h1 class="text-center mb-4">
📄 Resume Analyzer
</h1>
<div class="mb-4">

<label class="form-label">
📄 Upload Resume PDF
</label>

<input
type="file"
id="resumeFile"
class="form-control"
accept=".pdf">

</div>

<button
onclick="uploadResume()"
class="btn btn-success mb-4">

Upload & Analyze PDF

</button>

<hr class="text-white">

<label class="mb-3">
Or Paste Resume Content
</label>


<textarea
id="resumeText"
rows="15"
class="form-control">

</textarea>

<button
onclick="analyzeResume()"
class="btn btn-primary mt-3">

Analyze Pasted Resume

</button>

<div
id="loader"
class="loader">

<div class="spinner-border">
</div>

<p>
Analyzing Resume...
</p>

</div>
<button
onclick="downloadPDF()"
class="btn btn-danger mt-3 mb-3">

📥 Download Report PDF

</button>

<div
id="result"
class="result">

</div>

</div>

</div>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
	let latestAnalysis = "";
async function analyzeResume(){

    let text =
    document.getElementById("resumeText").value;

    if(text.trim()===""){

        alert("Paste resume first");
        return;
    }

    document.getElementById("loader")
    .style.display="block";

    try{

        let response =
        await fetch(
        "/api/resume/analyze",
        {
            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                resumeText:text
            })
        });

        let data =
        await response.json();

        console.log(data);

        document.getElementById("loader")
        .style.display="none";

        document.getElementById("result")
        .style.display="block";

		
		latestAnalysis =
		data.answer;

		document.getElementById("result")
		.innerHTML =
		marked.parse(data.answer);

    }
    catch(error){

        document.getElementById("loader")
        .style.display="none";

        console.error(error);

        alert("Error analyzing resume");
    }
}

async function uploadResume(){

    let file =
    document.getElementById("resumeFile")
    .files[0];

    if(!file){

        alert("Please select a PDF file");
        return;
    }

    let formData =
    new FormData();

    formData.append(
        "file",
        file
    );

    document.getElementById("loader")
    .style.display="block";

    try{

        let response =
        await fetch(
        "/api/resume/upload",
        {
            method:"POST",
            body:formData
        });

        let data =
        await response.json();

        document.getElementById("loader")
        .style.display="none";

        document.getElementById("result")
        .style.display="block";

		latestAnalysis =
		data.analysis;

		document.getElementById("result")
		.innerHTML =
		marked.parse(data.analysis);

    }
    catch(error){

        document.getElementById("loader")
        .style.display="none";

        console.error(error);

        alert("PDF Upload Failed");
    }
}
async function downloadPDF(){

    if(latestAnalysis===""){

        alert(
            "Generate analysis first"
        );

        return;
    }

    const response =
    await fetch(
    "/api/pdf/download",
    {
        method:"POST",

        headers:{
            "Content-Type":"text/plain"
        },

        body:latestAnalysis
    });

    const blob =
    await response.blob();

    const url =
    window.URL.createObjectURL(blob);

    const a =
    document.createElement("a");

    a.href=url;

    a.download=
    "resume-analysis.pdf";

    a.click();

    window.URL
    .revokeObjectURL(url);
}
</script>
</body>

</html>
