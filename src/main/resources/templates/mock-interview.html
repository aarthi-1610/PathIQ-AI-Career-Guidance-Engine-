<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>AI Mock Interview</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

body{
background:
linear-gradient(
135deg,
#0f172a,
#1e293b,
#312e81
);

min-height:100vh;
color:white;
}

.glass{

background:rgba(255,255,255,0.1);

backdrop-filter:blur(12px);

border-radius:20px;

padding:30px;
}

.result{

margin-top:20px;

background:#111827;

padding:20px;

border-radius:15px;

display:none;
}

.loader{

display:none;

text-align:center;

margin-top:20px;
}

textarea{

background:#111827 !important;

color:white !important;

border:none !important;
}

input{

background:#111827 !important;

color:white !important;

border:none !important;
}

</style>

</head>

<body>

<div class="container py-5">

<h1 class="text-center mb-4">
🎤 AI Mock Interview
</h1>

<div class="glass">

<div class="mb-3">

<label>
Job Role
</label>

<input
type="text"
id="role"
class="form-control"
placeholder="Java Developer">

</div>

<button
onclick="startInterview()"
class="btn btn-success">

Start Interview

</button>
<h5 id="progress" class="mt-3">
Question 0 / 5
</h5>

<div id="scoreCard"
class="alert alert-success mt-3"
style="display:none;">
</div>

<hr>

<h4>
Interview Question
</h4>

<div
id="question"
class="result">

</div>

<div class="mt-4">

<label>
Your Answer
</label>

<textarea
id="answer"
rows="6"
class="form-control">
</textarea>

</div>

<button
id="submitBtn"
onclick="submitAnswer()"
class="btn btn-primary mt-3">

Submit Answer

</button>

<button
onclick="restartInterview()"
class="btn btn-warning mt-3 ms-2">

🔄 Restart Interview

</button>

<button
onclick="startVoice()"
class="btn btn-info mt-3 ms-2">

🎙️ Speak Answer

</button>

<div
id="loader"
class="loader">

<div class="spinner-border">
</div>

<p>
AI is evaluating...
</p>

</div>

<div
id="feedback"
class="result">

</div>

</div>

</div>
<script>

let currentQuestion = "";
let questionCount = 0;
let totalScore = 0;

document.getElementById("progress")
.innerHTML =
"Question 0 / 5 | Score: 0/50";

async function startInterview(){

    let role =
    document.getElementById("role")
    .value;

    if(role.trim() === ""){

        alert("Enter role");
        return;
    }

    questionCount = 0;
    totalScore = 0;

    document.getElementById("progress")
    .innerHTML =
    "Question 0 / 5 | Score: 0/50";

    document.getElementById("scoreCard")
    .style.display = "none";

    document.getElementById("feedback")
    .style.display = "none";

    document.getElementById("submitBtn")
    .disabled = false;

    document.getElementById("answer")
    .value = "";

    document.getElementById("loader")
    .style.display = "block";

    try{

        let response =
        await fetch(
        "/api/mock/start",
        {
            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                role:role
            })
        });

        let data =
        await response.json();

        document.getElementById("loader")
        .style.display = "none";

        document.getElementById("question")
        .style.display = "block";

        document.getElementById("question")
        .innerHTML =
        marked.parse(data.response);
		speakQuestion(data.response);

    }
    catch(error){

        document.getElementById("loader")
        .style.display = "none";

        alert("Error");

        console.log(error);
    }
}

async function submitAnswer(){

    let role =
    document.getElementById("role")
    .value;

    let answer =
    document.getElementById("answer")
    .value;

    if(answer.trim() === ""){

        alert("Enter answer");
        return;
    }

    document.getElementById("loader")
    .style.display = "block";

    try{

        let response =
        await fetch(
        "/api/mock/evaluate",
        {
            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                role:role,
                answer:answer

            })
        });

        let data =
        await response.json();

        console.log(data);

        questionCount++;

        let result =
        data.response;

        let scoreMatch =
        result.match(/Score:\s*(\d+)/i);

        if(scoreMatch){

            totalScore +=
            parseInt(scoreMatch[1]);
        }

        document.getElementById("scoreCard")
        .style.display = "block";

        document.getElementById("scoreCard")
        .innerHTML =
        "🏆 Current Score: " +
        totalScore +
        "/50";

        document.getElementById("progress")
        .innerHTML =
        "Question " +
        questionCount +
        " / 5 | Score: " +
        totalScore +
        "/50";

        document.getElementById("loader")
        .style.display = "none";

        let parts =
        result.split(/Next.*Question:/i);

        let feedback =
        parts[0];

        let nextQuestion =
        parts.length > 1
        ? parts[1]
        : "";

        document.getElementById("feedback")
        .style.display = "block";

        document.getElementById("feedback")
        .innerHTML =
        marked.parse(feedback);

        if(nextQuestion.trim() !== ""
           && questionCount < 5){

            document.getElementById("question")
            .style.display = "block";

            document.getElementById("question")
            .innerHTML =
            marked.parse(nextQuestion);
			speakQuestion(nextQuestion);

            document.getElementById("answer")
            .value = "";
        }

        if(questionCount >= 5){

            let averageScore =
            (totalScore / 5).toFixed(1);

            document.getElementById("question")
            .innerHTML =
            "<h3>✅ Interview Finished</h3>";

            document.getElementById("feedback")
            .innerHTML +=
            `
            <hr>

            <h3>
            🏆 Interview Completed
            </h3>

            <h4>
            Final Score: ${totalScore}/50
            </h4>

            <h4>
            Average Score: ${averageScore}/10
            </h4>

            <p>
            Great job completing the mock interview.
            </p>
            `;

            document.getElementById("submitBtn")
            .disabled = true;
        }			
		
    }
    catch(error){

        document.getElementById("loader")
        .style.display = "none";

        alert("Error");

        console.log(error);
    }
}
function restartInterview(){

			    questionCount = 0;
			    totalScore = 0;

			    document.getElementById("role").value = "";
			    document.getElementById("answer").value = "";

			    document.getElementById("question").innerHTML = "";
			    document.getElementById("feedback").innerHTML = "";

			    document.getElementById("question").style.display = "none";
			    document.getElementById("feedback").style.display = "none";

			    document.getElementById("scoreCard").style.display = "none";

			    document.getElementById("progress").innerHTML =
			    "Question 0 / 5 | Score: 0/50";

			    document.getElementById("submitBtn").disabled = false;
			}

			function startVoice(){

			    if(
			        !('webkitSpeechRecognition' in window)
			    ){
			        alert(
			        "Speech Recognition not supported"
			        );
			        return;
			    }

			    const recognition =
			    new webkitSpeechRecognition();

			    recognition.lang = "en-US";
			    recognition.continuous = false;
			    recognition.interimResults = false;
			    recognition.maxAlternatives = 1;

			    recognition.start();

			    recognition.onstart = function(){

			        console.log("Listening...");
			    };

			    recognition.onresult = function(event){

			        let transcript =
			        event.results[0][0].transcript;

			        document.getElementById("answer")
			        .value = transcript;

			        console.log(
			        "You Said:",
			        transcript
			        );
			    };

			    recognition.onerror = function(event){

			        console.log(
			        "Voice Error:",
			        event.error
			        );
			    };

			    recognition.onend = function(){

			        console.log(
			        "Voice Ended"
			        );
			    };
			}
			function speakQuestion(text){

			    window.speechSynthesis.cancel();

			    let speech =
			    new SpeechSynthesisUtterance(text);

			    speech.lang = "en-US";
			    speech.rate = 1;

			    window.speechSynthesis
			    .speak(speech);
			}	

</script>
</body>

</html>
