<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

body{
background:
linear-gradient(
135deg,
#0f172a,
#1e293b,
#312e81
);

min-height:100vh;
color:white;
}

.card-box{

background:rgba(255,255,255,0.1);

backdrop-filter:blur(12px);

border-radius:20px;

padding:30px;

transition:.4s;

height:100%;
}

.card-box:hover{

transform:translateY(-10px);

box-shadow:0 15px 30px rgba(0,0,0,.4);
}

.feature-icon{

font-size:55px;

margin-bottom:20px;
}

.logout-btn{

border-radius:12px;

padding:10px 20px;

font-weight:600;

transition:.3s;

}

.logout-btn:hover{

transform:translateY(-3px);

box-shadow:0 10px 20px rgba(255,0,0,.3);

}

</style>
<script>

function logout(){

    if(confirm("Are you sure you want to logout?")){

        window.location.href="/login";

    }

}

</script>

</head>

<body>

<div class="container py-5">

	<div class="d-flex justify-content-between align-items-center mb-5">

	<h1>
	🚀 AI Career Assistant Dashboard
	</h1>

	<button
	onclick="logout()"
	class="btn btn-danger logout-btn">

	<i class="fa-solid fa-right-from-bracket"></i>
	Logout

	</button>

	</div>

<div class="row g-4">

<div class="col-md-6 col-lg-4">

<a href="/chat-ui"
style="text-decoration:none;color:white;">

<div class="card-box text-center">

<div class="feature-icon">
💬
</div>

<h4>AI Chat</h4>

<p>
Ask any technical question.
</p>

</div>

</a>

</div>

<div class="col-md-6 col-lg-4">

<a href="/resume-ui"
style="text-decoration:none;color:white;">

<div class="card-box text-center">

<div class="feature-icon">
📄
</div>

<h4>Resume Analyzer</h4>

<p>
Analyze your resume instantly.
</p>

</div>

</a>

</div>

<div class="col-md-6 col-lg-4">

<a href="/interview-ui"
style="text-decoration:none;color:white;">

<div class="card-box text-center">

<div class="feature-icon">
🎯
</div>

<h4>Interview Generator</h4>

<p>
Generate interview questions.
</p>

</div>

</a>

</div>

<div class="col-md-6 col-lg-4">

<a href="/roadmap-ui"
style="text-decoration:none;color:white;">

<div class="card-box text-center">

<div class="feature-icon">
🛣️
</div>

<h4>Career Roadmap</h4>

<p>
AI generated learning roadmap.
</p>

</div>

</a>

</div>

<div class="col-md-6 col-lg-4">

<a href="/mock-interview-ui"
style="text-decoration:none;color:white;">

<div class="card-box text-center">

<div class="feature-icon">
🎤
</div>

<h4>AI Mock Interview</h4>

<p>
Practice real interview sessions with AI.
</p>

</div>

</a>

</div>

</div>

</div>

</body>

</html>
