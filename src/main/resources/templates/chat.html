<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Career Assistant Chat</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f172a;
    color:white;
    height:100vh;
    overflow:hidden;
}

/* Sidebar */

.sidebar{
    width:260px;
    background:#111827;
    height:100vh;
    position:fixed;
    left:0;
    top:0;
    padding:20px;
    border-right:1px solid #1f2937;
}

.logo{
    font-size:24px;
    font-weight:bold;
    margin-bottom:30px;
}

.new-chat-btn{
    width:100%;
    margin-bottom:20px;
}

.menu-item{
    display:block;
    color:white;
    text-decoration:none;
    padding:12px;
    border-radius:10px;
    margin-bottom:10px;
}

.menu-item:hover{
    background:#1e293b;
}

/* Main */

.main{
    margin-left:260px;
    height:100vh;
    display:flex;
    flex-direction:column;
}

.chat-header{
    padding:20px;
    border-bottom:1px solid #1e293b;
    background:#111827;
}

.chat-body{
    flex:1;
    overflow-y:auto;
    padding:20px;
}

/* Messages */

.user-message{
    background:#2563eb;
    padding:12px 18px;
    border-radius:15px;
    margin:10px 0;
    max-width:75%;
    margin-left:auto;
}

.bot-message{
    background:#1e293b;
    padding:15px;
    border-radius:15px;
    margin:10px 0;
    max-width:85%;
}

.bot-message h1,
.bot-message h2,
.bot-message h3,
.bot-message h4{
    color:#60a5fa;
}

.bot-message pre{
    background:black;
    padding:12px;
    border-radius:10px;
    overflow-x:auto;
}

.bot-message code{
    color:#22c55e;
}

/* Input */

.chat-input{
    padding:20px;
    border-top:1px solid #1e293b;
    background:#111827;
}

.typing{
    color:#60a5fa;
    margin-top:10px;
    display:none;
}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<div class="logo">
🤖 AI Career Assistant
</div>

<a href="/dashboard" class="btn btn-primary new-chat-btn">
Dashboard
</a>

<a href="/chat-ui" class="menu-item">
💬 AI Chat
</a>

<a href="/resume-ui" class="menu-item">
📄 Resume Analyzer
</a>

<a href="/interview-ui" class="menu-item">
🎯 Interview Generator
</a>

<a href="/roadmap-ui" class="menu-item">
🛣️ Career Roadmap
</a>

</div>

<!-- Main -->

<div class="main">

<div class="chat-header">

<h4>
AI Chat Assistant
</h4>

</div>

<div id="chatBox" class="chat-body">

<div class="bot-message">
👋 Hello Aarthi!

Ask me anything about:

<ul>
<li>Java</li>
<li>Spring Boot</li>
<li>DSA</li>
<li>Machine Learning</li>
<li>Interview Preparation</li>
</ul>

</div>

</div>

<div class="chat-input">

<div class="input-group">

<input
type="text"
id="question"
class="form-control"
placeholder="Ask anything...">

<button
class="btn btn-primary"
onclick="sendMessage()">

Send

</button>

</div>

<div id="typing" class="typing">
🤖 AI is thinking...
</div>

</div>

</div>

<script>

async function sendMessage(){

    let question =
    document.getElementById("question").value;

    if(question.trim()==="")
    return;

    let chatBox =
    document.getElementById("chatBox");

    chatBox.innerHTML +=
    `<div class="user-message">
        ${question}
    </div>`;

    document.getElementById("question").value="";

    document.getElementById("typing").style.display="block";

    try{

        let response =
        await fetch("/api/chat",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                question:question
            })

        });

        let data =
        await response.json();

        document.getElementById("typing").style.display="none";

        chatBox.innerHTML +=
        `<div class="bot-message">
            ${marked.parse(data.answer)}
        </div>`;

        chatBox.scrollTop =
        chatBox.scrollHeight;

    }
    catch(error){

        document.getElementById("typing").style.display="none";

        chatBox.innerHTML +=
        `<div class="bot-message">
            Error connecting to AI.
        </div>`;

        console.error(error);
    }
}

document.getElementById("question")
.addEventListener("keypress",function(event){

    if(event.key==="Enter"){
        sendMessage();
    }

});

</script>

</body>
</html>
