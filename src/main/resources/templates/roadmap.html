<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Career Roadmap Generator</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>

body{
background:
linear-gradient(
135deg,
#0f172a,
#1e293b,
#312e81
);

min-height:100vh;
color:white;
}

.glass{

background:rgba(255,255,255,0.1);

backdrop-filter:blur(12px);

border-radius:20px;

padding:30px;
}

.result{

margin-top:20px;

background:#111827;

padding:20px;

border-radius:15px;

display:none;
}

.loader{

display:none;

text-align:center;

margin-top:20px;
}

.timeline{

border-left:3px solid #60a5fa;
padding-left:20px;
}

.timeline-item{

margin-bottom:20px;
padding:15px;
background:#1e293b;
border-radius:10px;
}

.timeline h2{

background:#2563eb;
padding:12px;
border-radius:10px;
margin-top:20px;
}

.timeline ul{

list-style:none;
padding-left:0;
}

.timeline li{

background:#1e293b;
margin:10px 0;
padding:12px;
border-radius:10px;
border-left:5px solid #38bdf8;
}

.timeline li:hover{

transform:translateX(5px);
transition:0.3s;
}

</style>

</head>

<body>

<div class="container py-5">

<h1 class="text-center mb-4">
🛣️ AI Career Roadmap Generator
</h1>

<div class="glass">

<div class="mb-3">

<label>Target Career</label>

<input
type="text"
id="career"
class="form-control"
placeholder="Java Full Stack Developer">

</div>

<button
onclick="generateRoadmap()"
class="btn btn-primary">

Generate Roadmap

</button>

<div
id="loader"
class="loader">

<div class="spinner-border">
</div>

<p>
Generating Roadmap...
</p>

</div>

<div
id="result"
class="result">

</div>

</div>

</div>

<script>

async function generateRoadmap(){

let career =
document.getElementById("career").value;

if(career.trim()===""){

alert("Enter career goal");

return;
}

document.getElementById("loader")
.style.display="block";

try{

let response =
await fetch(
"/api/roadmap/generate",
{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
career:career
})

});

let data =
await response.json();

document.getElementById("loader")
.style.display="none";

document.getElementById("result")
.style.display="block";

document.getElementById("result")
.innerHTML =
`
<div class="timeline">
${marked.parse(data.roadmap)}
</div>
`;

}
catch(error){

document.getElementById("loader")
.style.display="none";

alert("Error generating roadmap");

console.log(error);
}

}

</script>

</body>

</html>
